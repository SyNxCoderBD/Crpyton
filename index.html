<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypton - Encrypt & Decrypt</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
      "imports": {
        "crypto-utils": "./crypto-utils.js"
      }
    }
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Crypton</h1>
            <p>Privacy-first encryption</p>
            <p class="author">Created by Sayon</p>
        </header>

        <main class="main-card">
            <div class="input-group">
                <div class="label-row">
                    <label for="password">Secret Key</label>
                    <div class="checkbox-container">
                        <input type="checkbox" id="use-default-key">
                        <label for="use-default-key" class="checkbox-label">Use Default</label>
                    </div>
                </div>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password..." autocomplete="off">
                    <button type="button" id="toggle-password" class="icon-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <div class="input-group flex-grow">
                <div class="label-row">
                    <label for="text-input">Message</label>
                    <label for="image-input" class="image-upload-btn">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        Add Image
                    </label>
                    <input type="file" id="image-input" accept="image/*" hidden>
                </div>
                
                <div id="image-preview-container" class="hidden">
                    <img id="image-preview" src="" alt="Preview">
                    <div id="integrity-badge" class="integrity-badge">
                        <span class="dot"></span>
                        <span class="label">Verifying...</span>
                    </div>
                    <button id="remove-image-btn" class="remove-btn">&times;</button>
                </div>

                <div id="quality-settings" class="quality-settings hidden">
                    <div class="label-row">
                        <label>Image Quality</label>
                        <span id="quality-value">40.0%</span>
                    </div>
                    <input type="range" id="quality-slider" min="1" max="1000" value="400" step="1">
                    
                    <div class="label-row" style="margin-top: 12px;">
                        <label>Compression</label>
                        <span id="compress-value">1</span>
                    </div>
                    <input type="range" id="compress-slider" min="1" max="100" value="1" step="1">
                </div>

                <textarea id="text-input" placeholder="Type message or paste encrypted data..."></textarea>
            </div>

            <div class="action-buttons">
                <button id="encrypt-btn" class="primary">Encrypt</button>
                <button id="decrypt-btn" class="secondary">Decrypt</button>
            </div>

            <div id="progress-container" class="progress-container hidden">
                <div class="progress-bar-wrapper">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <span id="progress-label">Processing...</span>
            </div>

            <div id="output-container" class="hidden">
                <label>Result</label>
                <div class="output-wrapper">
                    <div id="output-content">
                        <img id="output-image" class="hidden" src="" alt="Decrypted Image">
                        <pre id="output-text"></pre>
                    </div>
                    <button id="copy-btn" class="copy-full-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy All Results
                    </button>
                </div>
            </div>
        </main>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
