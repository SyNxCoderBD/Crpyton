
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypton - Text Encryptor & Decryptor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            primary: '#8B5CF6', /* Violet 500 */
                            secondary: '#EC4899', /* Pink 500 */
                            accent: '#10B981', /* Emerald 500 */
                            darkBg: '#0F172A', /* Slate 900 */
                            darkCard: '#1E293B', /* Slate 800 */
                            lightBg: '#F8FAFC', /* Slate 50 */
                            lightCard: '#FFFFFF',
                        }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Fira Code', 'Courier New', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CryptoJS Library for secure encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" xintegrity="sha512-E8QSvWZ06DLCDryzWXODQI+/qoUtGp8CoL6Zg14jxOYQQyR4LN68T579iaf6yd1Gc3Mc1YdecYFAlQRRSle6mQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-cyber-lightBg text-slate-800 dark:bg-cyber-darkBg dark:text-slate-100 min-h-screen flex flex-col">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none"></div>

    <!-- Navigation Header -->
    <header class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-cyber-darkCard/80 backdrop-blur-md sticky top-0 z-40 transition-colors duration-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-gradient-to-tr from-cyber-primary to-cyber-secondary rounded-xl text-white shadow-lg shadow-cyber-primary/20">
                    <!-- Key / Lock SVG Icon -->
                    <svg class="w-6 h-6 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-cyber-primary via-indigo-500 to-cyber-secondary bg-clip-text text-transparent">
                        CRYPTON
                    </h1>
                    <p class="text-[10px] text-slate-400 dark:text-slate-500 tracking-wider font-mono">SECURE SUITE v1.2 BY SAYON</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <!-- Live Mode Status Badge -->
                <span id="realtime-badge" class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 dark:bg-emerald-950/50 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-900/50">
                    <span class="w-1.5 h-1.5 mr-1.5 bg-emerald-500 rounded-full animate-ping"></span>
                    Live Mode Active
                </span>

                <!-- Dark/Light Theme Toggle -->
                <button id="theme-toggle" class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800/80 transition-all text-slate-500 dark:text-slate-400 focus:outline-none focus:ring-2 focus:ring-cyber-primary/50" aria-label="Toggle Theme">
                    <!-- Sun Icon (visible in dark) -->
                    <svg id="theme-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <!-- Moon Icon (visible in light) -->
                    <svg id="theme-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-8">
        
        <!-- Dashboard Container -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Left Side: Config & Settings (4 cols on lg) -->
            <section class="lg:col-span-4 flex flex-col gap-6">
                
                <!-- Card Container -->
                <div class="bg-white dark:bg-cyber-darkCard rounded-2xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm hover:shadow-md transition-shadow duration-300">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800 dark:text-white">
                        <span class="p-1.5 bg-violet-100 dark:bg-violet-950/50 text-cyber-primary rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        </span>
                        Configuration
                    </h2>

                    <!-- Mode Select Toggle Button -->
                    <div class="mb-6">
                        <label class="block text-xs font-semibold tracking-wider uppercase text-slate-400 dark:text-slate-500 mb-2">Operation Mode</label>
                        <div class="grid grid-cols-2 p-1 bg-slate-100 dark:bg-slate-900 rounded-xl border border-slate-200/50 dark:border-slate-800">
                            <button id="btn-mode-encrypt" class="py-2.5 px-4 rounded-lg font-semibold text-sm transition-all duration-200 bg-gradient-to-r from-cyber-primary to-indigo-600 text-white shadow-md shadow-cyber-primary/20" onclick="setMode('encrypt')">
                                Encrypt
                            </button>
                            <button id="btn-mode-decrypt" class="py-2.5 px-4 rounded-lg font-semibold text-sm transition-all duration-200 text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white" onclick="setMode('decrypt')">
                                Decrypt
                            </button>
                        </div>
                    </div>

                    <!-- Algorithm Select -->
                    <div class="mb-6">
                        <label for="algorithm-select" class="block text-xs font-semibold tracking-wider uppercase text-slate-400 dark:text-slate-500 mb-2">Algorithm</label>
                        <select id="algorithm-select" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-cyber-primary focus:border-transparent cursor-pointer font-medium text-slate-800 dark:text-slate-200" onchange="handleAlgorithmChange()">
                            <optgroup label="Highly Secure Symmetric">
                                <option value="aes" selected>AES (256-bit AES-CBC)</option>
                                <option value="tripledes">Triple DES (3DES)</option>
                                <option value="rc4">RC4 Stream Cipher</option>
                            </optgroup>
                            <optgroup label="Classical / Historical">
                                <option value="caesar">Caesar Cipher (Shift)</option>
                                <option value="vigenere">Vigenère Cipher (Word-Key)</option>
                                <option value="rot13">ROT13 (A-M / N-Z Swap)</option>
                            </optgroup>
                            <optgroup label="Utility / Encoders">
                                <option value="base64">Base64 Encoded Format</option>
                                <option value="morse">Morse Code</option>
                            </optgroup>
                        </select>
                    </div>

                    <!-- Dynamic Key Parameter Panels -->
                    <div id="param-container" class="space-y-4">
                        <!-- Password Key (For AES, 3DES, RC4) -->
                        <div id="param-passkey" class="space-y-2">
                            <div class="flex justify-between items-center flex-wrap gap-1">
                                <label for="secret-key" class="block text-xs font-semibold tracking-wider uppercase text-slate-400 dark:text-slate-500">Secret Key / Passphrase</label>
                                <div class="flex items-center gap-2">
                                    <button onclick="loadDefaultKey()" class="text-[11px] text-cyber-accent hover:underline flex items-center gap-1 font-semibold" title="Fill with secure default passphrase">
                                        <span>Default Key</span>
                                    </button>
                                    <span class="text-slate-300 dark:text-slate-700">|</span>
                                    <button onclick="toggleKeyVisibility()" class="text-[11px] text-cyber-primary hover:underline flex items-center gap-1 font-semibold">
                                        <span id="key-visibility-text">Show</span>
                                    </button>
                                </div>
                            </div>
                            <div class="relative">
                                <input id="secret-key" type="password" placeholder="Enter key (e.g., d3m0-p@ssw0rd!)" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl pl-4 pr-10 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-cyber-primary focus:border-transparent font-mono" oninput="triggerProcessing(); checkKeyStrength();">
                                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m-3-3a3 3 0 00-3 3v2a3 3 0 01-3 3H6a3 3 0 00-3 3v1a2 2 0 002 2h2a2 2 0 002-2v-1a2 2 0 002-2h2a2 2 0 002-2V9a3 3 0 00-3-3z"></path></svg>
                                </div>
                            </div>
                            <!-- Strength Indicator for Secure Algorithms -->
                            <div id="key-strength-container" class="pt-1.5">
                                <div class="flex justify-between items-center mb-1 text-[11px]">
                                    <span class="text-slate-400">Key Strength Estimation:</span>
                                    <span id="strength-label" class="font-bold text-red-500">Weak</span>
                                </div>
                                <div class="w-full h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                    <div id="strength-bar" class="w-1/4 h-full bg-red-500 transition-all duration-300"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Caesar Shift Slider -->
                        <div id="param-caesar" class="space-y-2 hidden">
                            <div class="flex justify-between items-center">
                                <label for="caesar-shift" class="block text-xs font-semibold tracking-wider uppercase text-slate-400 dark:text-slate-500">Caesar Shift Value</label>
                                <span id="caesar-shift-badge" class="bg-violet-100 dark:bg-violet-950/50 text-cyber-primary text-xs font-bold font-mono px-2.5 py-0.5 rounded-full">3</span>
                            </div>
                            <input id="caesar-shift" type="range" min="1" max="25" value="3" class="w-full h-2 bg-slate-100 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer accent-cyber-primary" oninput="updateCaesarLabel(this.value)">
                            <div class="flex justify-between text-[10px] text-slate-400 font-mono px-1">
                                <span>A→B (1)</span>
                                <span>A→Z (25)</span>
                            </div>
                        </div>

                        <!-- Vigenere Key -->
                        <div id="param-vigenere" class="space-y-2 hidden">
                            <label for="vigenere-key" class="block text-xs font-semibold tracking-wider uppercase text-slate-400 dark:text-slate-500">Vigenère Key Word</label>
                            <input id="vigenere-key" type="text" placeholder="KEYWORD (letters only)" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-cyber-primary focus:border-transparent font-mono tracking-widest uppercase" oninput="sanitizeVigenereInput(this); triggerProcessing();">
                            <p class="text-[10px] text-slate-400">Non-alphabet characters are ignored for key derivation.</p>
                        </div>

                        <!-- No parameters needed text -->
                        <div id="param-none" class="hidden text-center py-4 border border-dashed border-slate-200 dark:border-slate-800 rounded-xl bg-slate-50/50 dark:bg-slate-900/30">
                            <p class="text-xs text-slate-400 italic">No custom secret key required for this algorithm.</p>
                        </div>
                    </div>
                </div>

                <!-- Live Performance Box & Tips -->
                <div class="bg-white dark:bg-cyber-darkCard rounded-2xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm">
                    <h3 class="text-xs font-bold tracking-wider uppercase text-slate-400 dark:text-slate-500 mb-3 flex items-center gap-1.5">
                        <svg class="w-4 h-4 text-cyber-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Algorithm Insights
                    </h3>
                    <div id="algorithm-description" class="text-xs text-slate-600 dark:text-slate-400 space-y-2 leading-relaxed">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </section>

            <!-- Right Side: Text Workspace (8 cols on lg) -->
            <section class="lg:col-span-8 flex flex-col gap-6">
                
                <!-- Main Board Workspace Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch">
                    
                    <!-- Left Block: Input Container -->
                    <div class="bg-white dark:bg-cyber-darkCard rounded-2xl border border-slate-200 dark:border-slate-800 p-5 flex flex-col min-h-[380px] shadow-sm">
                        <div class="flex items-center justify-between mb-3 pb-3 border-b border-slate-100 dark:border-slate-800">
                            <div class="flex items-center gap-2">
                                <span class="flex h-2.5 w-2.5 relative">
                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-indigo-500"></span>
                                </span>
                                <h3 id="input-title-text" class="text-sm font-bold text-slate-700 dark:text-slate-300">Plaintext Input</h3>
                            </div>
                            
                            <!-- Import Button -->
                            <label class="cursor-pointer text-xs text-slate-500 hover:text-cyber-primary transition-colors flex items-center gap-1 font-medium bg-slate-100 dark:bg-slate-900 px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-800">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                <span>Import File</span>
                                <input id="file-uploader" type="file" accept=".txt,.json,.csv,.xml,.md" class="hidden" onchange="handleFileImport(event)">
                            </label>
                        </div>

                        <!-- Real Area -->
                        <div class="relative flex-grow flex flex-col">
                            <textarea id="input-text" placeholder="Type or drop text to encrypt here..." class="w-full flex-grow bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-cyber-primary focus:border-transparent font-sans resize-none min-h-[220px]" oninput="triggerProcessing()"></textarea>
                        </div>

                        <!-- Text Stats bar -->
                        <div class="flex items-center justify-between mt-3 text-[11px] text-slate-400 dark:text-slate-500 font-mono">
                            <div class="flex gap-4">
                                <span>Chars: <span id="input-char-count" class="text-slate-600 dark:text-slate-300">0</span></span>
                                <span>Words: <span id="input-word-count" class="text-slate-600 dark:te
